version: 2
updates:
  # Le dice a Dependabot que revise el package.json
  - package-ecosystem: npm
    directory: "/client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope

  # Dependabot revisa el FROM y abre un PR actualizando dicha línea
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly